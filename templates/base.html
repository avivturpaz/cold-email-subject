<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Cold Email Subject Tester{% endblock %}</title>
  <meta name="description" content="Score five cold email subject line variants for length, personalization, urgency, spam risk, and predicted open rate.">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  {% if plausible_domain %}<script defer data-domain="{{ plausible_domain }}" src="https://plausible.io/js/script.js"></script>{% endif %}
</head>
<body>
  <div class="page-sheen"></div>
  <div class="page-grid"></div>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
